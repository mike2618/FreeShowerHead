<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Shower Head</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h1 { font-size: 20px; margin-bottom: 10px; }
    p { font-size: 14px; color: #555; margin-bottom: 20px; }

    select {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .city {
      font-size: 14px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .ottawa { color: #28a745; }
    .kingston { color: #007bff; }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      margin-bottom: 12px;
      color: white;
      font-weight: bold;
    }

    #copyBtn { background: #28a745; }
    #referralBtn { background: #ff9800; }
    #reviewBtn { background: #444; }

    button:active { opacity: 0.9; }

    .status { margin-top: 15px; color: green; font-size: 14px; }
  </style>
</head>
<body>

<div class="box">
  <h1>🎁 Get Your Free Shower Head</h1>
  <p>Select your sales rep and choose an action</p>

  <select id="salesRep">
    <option value="">-- Select your name --</option>
  </select>

  <div id="cityIndicator" class="city"></div>

  <button id="copyBtn">Copy Facebook Message</button>
  <button id="referralBtn">View Referral Prizes</button>
  <button id="reviewBtn">Leave a Google Review</button>

  <div id="status" class="status"></div>
</div>

<script>
  const salesReps = [
    "Michael A","Amelie L","Elliot N","Steven L","Maddie J","Joe M",
    "Eduardo T","Emmo O","John M","Kevin P",
    "Brody C","Ahsan A","Michaela T","Stephanie C","Gavin T",
    "Haprielle J","Kaedence B","Carmen C","Rico E","Hope H",
    "William V","Manas R","Derrick M","Bryan Steffens","Cass I"
  ];

  const kingstonReps = [
    "Stephanie","Gavin","Haprielle","Kaedence","Hope",
    "William","Derrick","Bryan","Cass"
  ];

  const select = document.getElementById("salesRep");
  const status = document.getElementById("status");
  const cityIndicator = document.getElementById("cityIndicator");

  // Populate dropdown
  salesReps.forEach(rep => {
    const option = document.createElement("option");
    option.value = rep;
    option.textContent = rep;
    select.appendChild(option);
  });

  function getRepId(fullName) {
    const parts = fullName.trim().split(" ");
    const firstName = parts[0];
    const lastName = parts[parts.length - 1];

    return firstName.charAt(0).toUpperCase() + firstName.slice(1).toLowerCase()
         + lastName.charAt(0).toUpperCase();
  }

  function getFirstName(fullName) {
    return fullName.split(" ")[0];
  }

  function isKingstonRep(fullName) {
    return kingstonReps.includes(getFirstName(fullName));
  }

  function getMessage(fullName) {
    const repId = getRepId(fullName);

    const baseLink = isKingstonRep(fullName)
      ? "https://getyourshowerhead.ca/free-kng"
      : "https://getyourshowerhead.ca/free-ott";

    return `I got a new Spa Shower Head from a company in Kingston and Ottawa.
They have given me the opportunity for any of my family or friends to get one FREE like I did. This shower head also removes chlorine from your shower. If you would like to get one just fill out their quick questionnaire and complete the test just like I did!
${baseLink}?am_id=${repId}`;
  }

  // 🔥 Update city indicator when rep is selected
  select.addEventListener("change", () => {
    const repFullName = select.value;

    if (!repFullName) {
      cityIndicator.textContent = "";
      return;
    }

    if (isKingstonRep(repFullName)) {
      cityIndicator.textContent = "Serving Kingston";
      cityIndicator.className = "city kingston";
    } else {
      cityIndicator.textContent = "Serving Ottawa";
      cityIndicator.className = "city ottawa";
    }
  });

  // Copy message
  document.getElementById("copyBtn").onclick = async () => {
    const repFullName = select.value;
    if (!repFullName) { alert("Please select your name"); return; }

    const message = getMessage(repFullName);
    await navigator.clipboard.writeText(message);
    status.textContent = "Copied! Now you can paste it anywhere.";
  };

  // Referral prizes
  document.getElementById("referralBtn").onclick = () => {
    const repFullName = select.value;
    if (!repFullName) { alert("Please select your name"); return; }

    const firstName = getFirstName(repFullName);

    const baseLink = isKingstonRep(repFullName)
      ? "https://mywatertest.ca/referral-prizes-kng"
      : "https://mywatertest.ca/referral-prizes-ott";

    window.open(`${baseLink}?am_id=${firstName}`, "_blank");
  };

  // Google review
  document.getElementById("reviewBtn").onclick = () => {
    window.open("https://share.google/NrjPAP65Sg0cYqOVX", "_blank");
  };

</script>

</body>
</html>
