<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Shower Head</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h1 { font-size: 20px; margin-bottom: 10px; }
    p { font-size: 14px; color: #555; margin-bottom: 20px; }

    select {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #1877f2;
      color: white;
      font-weight: bold;
    }

    button:active { opacity: 0.9; }
    .status { margin-top: 15px; color: green; font-size: 14px; }
  </style>
</head>
<body>

<div class="box">
  <h1>🎁 Get Your Free Shower Head</h1>
  <p>Select your sales rep and tap to share on Facebook</p>

  <select id="salesRep">
    <option value="">-- Select your name --</option>
  </select>

  <button id="shareBtn">Share on Facebook</button>

  <div id="status" class="status"></div>
</div>

<script>
  // List of sales reps
  const salesReps = [
    "Michael",
    "Alice",
    "Bob",
    "Charlie",
    "Diana"
  ];

  const select = document.getElementById("salesRep");

  // Populate dropdown
  salesReps.forEach(rep => {
    const option = document.createElement("option");
    option.value = rep.toLowerCase();
    option.textContent = rep;
    select.appendChild(option);
  });

  const btn = document.getElementById("shareBtn");
  const status = document.getElementById("status");

  btn.onclick = () => {
    const repId = select.value;
    if (!repId) {
      alert("Please select your name");
      return;
    }

    const message = `I got a new Spa Shower Head from a company in Kingston and Ottawa.
They have given me the opportunity for any of my family or friends to get one FREE like I did. This shower head also removes chlorine from your shower. If you would like to get one just fill out their quick questionnaire and complete the test just like I did!
https://getyourshowerhead.ca/free-ott?am_id=${repId}`;

    // Facebook share URL (opens Facebook app or web)
    const fbShareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://getyourshowerhead.ca/free-ott?am_id=' + repId)}&quote=${encodeURIComponent(message)}`;

    // Open in new tab/window
    window.open(fbShareUrl, '_blank');
  };
</script>

</body>
</html>
