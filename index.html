<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fsh</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h1 { font-size: 20px; margin-bottom: 10px; }
    p { font-size: 14px; color: #555; margin-bottom: 20px; }

    select {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      margin-bottom: 12px;
      color: white;
      font-weight: bold;
    }

    #copyBtn { background: #28a745; }   /* Green for copy */
    #fbBtn { background: #1877f2; }     /* Facebook blue */
    button:active { opacity: 0.9; }

    .status { margin-top: 15px; color: green; font-size: 14px; }
  </style>
</head>
<body>

<div class="box">
  <h1>🎁 Get Your Free Shower Head</h1>
  <p>Select your sales rep and choose an action</p>

  <select id="salesRep">
    <option value="">-- Select your name --</option>
  </select>

  <button id="copyBtn">Copy Message</button>
  <button id="fbBtn">Share on Facebook</button>

  <div id="status" class="status"></div>
</div>

<script>
  // List of 30+ sales reps
  const salesReps = [
    "Michael","Alice","Bob","Charlie","Diana","Eve","Frank","Grace","Hannah",
    "Ian","Jack","Karen","Leo","Mona","Nina","Oscar","Pam","Quincy","Rachel",
    "Steve","Tina","Uma","Victor","Wendy","Xander","Yara","Zane","Abby","Brian",
    "Cathy"
  ];

  const select = document.getElementById("salesRep");
  const status = document.getElementById("status");

  // Populate dropdown
  function renderDropdown(list) {
    select.innerHTML = '<option value="">-- Select your name --</option>';
    list.forEach(rep => {
      const option = document.createElement("option");
      option.value = rep.toLowerCase();
      option.textContent = rep;
      select.appendChild(option);
    });
  }

  renderDropdown(salesReps);

  // Make dropdown searchable on mobile: type to jump to matching options
  select.addEventListener("input", () => {
    // On most mobile browsers, this is handled natively in the select element
    // If needed, a more advanced searchable select can be added with JS libraries
  });

  function getMessage(repId) {
    return `I got a new Spa Shower Head from a company in Kingston and Ottawa.
They have given me the opportunity for any of my family or friends to get one FREE like I did. This shower head also removes chlorine from your shower. If you would like to get one just fill out their quick questionnaire and complete the test just like I did!
https://getyourshowerhead.ca/free-ott?am_id=${repId}`;
  }

  document.getElementById("copyBtn").onclick = async () => {
    const repId = select.value;
    if (!repId) { alert("Please select your name"); return; }

    const message = getMessage(repId);
    await navigator.clipboard.writeText(message);
    status.textContent = "Copied! Now you can paste it anywhere.";
  };

  document.getElementById("fbBtn").onclick = () => {
    const repId = select.value;
    if (!repId) { alert("Please select your name"); return; }

    const message = getMessage(repId);
    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://getyourshowerhead.ca/free-ott?am_id=' + repId)}&quote=${encodeURIComponent(message)}`;
    window.open(fbUrl, '_blank');
  };
</script>

</body>
</html>
